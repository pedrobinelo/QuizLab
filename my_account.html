<html lang="en">

    <meta charset="utf-8" />

    />
    <meta name="description" content="" />

    <link

      type="image/png"
      sizes="32x32"
      href="./assets/icons/book_pile.png"
    />
    <link

      type="image/png"
      sizes="192x192"
      href="./assets/icons/book_pile.png"

    <title>Minha conta</title>

    <!-- Custom styles for this template -->
    <link href="./css/global.css" rel="stylesheet" />
    <link href="./css/toast.css" rel="stylesheet" />
    <link href="./css/spinner.css" rel="stylesheet" />
    <link href="./css/my_account.css" rel="stylesheet" />
  </head>

  <body class="d-flex flex-column align-items-center">
    <div id="msgOrSpinner" class="spinner"></div>
    <div id="page-content" style="display: none" hidden>
      <div class="w-100 d-flex p-4 menu-div">
        <header class="d-flex w-100 justify-content-center">
          <nav class="nav nav-head d-flex">
            <a class="nav-link" href="dashboard.html">Início</a>
            <a class="nav-link" href="my_quizzes.html">Meus quizzes</a>
            <a class="nav-link active" href="my_account.html">Minha conta</a>
          </nav>
        </header>
      </div>

      <main class="d-flex flex-column text-center p-4 mt-5">
        <h2 class="p-3 m-0">Minha conta</h2>

        <div id="account-info" class="p-3 d-flex">
          <div>
            <div id="name-div" class="p-1 text-left">
              <p id="name" class="m-0">Nome do Usuário</p>
            </div>
            <div id="email-div" class="p-1 text-left">
              <p id="email-address" class="m-0">email@exemplo.com</p>
            </div>
          </div>
          <div id="btnsContainer" class="d-flex p-3">
            <button
              id="change-password-btn"
              class="btn btn-danger"
              onclick="
                recoverPassword(
                  document.getElementById('email-address').textContent,
                )
              "
            >
              Alterar senha
            </button>
          </div>
          <div id="wait-div" style="display: none">
            <h4>Aguarde...</h4>
          </div>
        </div>
      </main>
    </div>
    <!-- O container onde as notificações serão inseridas via JavaScript -->
    <div id="toast-container"></div>
  </body>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</html>
